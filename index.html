<!DOCTYPE html>
<html>
<head>
  <title>10 Months Map</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div id="map">

    <!--
      Smooth Catmull-Rom heart path through all 10 node centres:
        1(400,270)  2(490,190)  3(580,265)  4(555,400)  5(470,510)
        6(400,580)  7(330,510)  8(245,400)  9(220,265) 10(310,190)
    -->
    <svg id="roads" style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;">

      <!-- Perimeter road — border -->
      <path fill="none" stroke="#9e7f56" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"
        d="M 400 270
           C 430 270, 460 191, 490 190
           C 520 189, 569 230, 580 265
           C 591 300, 573 359, 555 400
           C 537 441, 496 480, 470 510
           C 444 540, 420 580, 400 580
           C 380 580, 356 540, 330 510
           C 304 480, 263 441, 245 400
           C 227 359, 209 300, 220 265
           C 231 230, 280 189, 310 190
           C 340 191, 370 270, 400 270 Z"/>

      <!-- Perimeter road — surface -->
      <path fill="none" stroke="#d4b87a" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"
        d="M 400 270
           C 430 270, 460 191, 490 190
           C 520 189, 569 230, 580 265
           C 591 300, 573 359, 555 400
           C 537 441, 496 480, 470 510
           C 444 540, 420 580, 400 580
           C 380 580, 356 540, 330 510
           C 304 480, 263 441, 245 400
           C 227 359, 209 300, 220 265
           C 231 230, 280 189, 310 190
           C 340 191, 370 270, 400 270 Z"/>

      <!-- Perimeter road — dashes -->
      <path fill="none" stroke="rgba(255,255,255,0.45)" stroke-width="2" stroke-dasharray="10,8" stroke-linecap="round"
        d="M 400 270
           C 430 270, 460 191, 490 190
           C 520 189, 569 230, 580 265
           C 591 300, 573 359, 555 400
           C 537 441, 496 480, 470 510
           C 444 540, 420 580, 400 580
           C 380 580, 356 540, 330 510
           C 304 480, 263 441, 245 400
           C 227 359, 209 300, 220 265
           C 231 230, 280 189, 310 190
           C 340 191, 370 270, 400 270 Z"/>

      <!-- Centre spoke — border -->
      <line x1="400" y1="403" x2="400" y2="270" stroke="#9e7f56" stroke-width="14" stroke-linecap="round"/>
      <!-- Centre spoke — surface -->
      <line x1="400" y1="403" x2="400" y2="270" stroke="#d4b87a" stroke-width="9" stroke-linecap="round"/>
      <!-- Centre spoke — dashes -->
      <line x1="400" y1="403" x2="400" y2="270" stroke="rgba(255,255,255,0.45)" stroke-width="2" stroke-dasharray="10,8" stroke-linecap="round"/>

    </svg>

    <!-- Heart perimeter nodes -->
    <div class="node" style="top:250px; left:380px;" data-title="Month 1">1</div>
    <div class="node" style="top:170px; left:470px;" data-title="Month 2">2</div>
    <div class="node" style="top:245px; left:560px;" data-title="Month 3">3</div>
    <div class="node" style="top:380px; left:535px;" data-title="Month 4">4</div>
    <div class="node" style="top:490px; left:450px;" data-title="Month 5">5</div>
    <div class="node" style="top:560px; left:380px;" data-title="Month 6">6</div>
    <div class="node" style="top:490px; left:310px;" data-title="Month 7">7</div>
    <div class="node" style="top:380px; left:225px;" data-title="Month 8">8</div>
    <div class="node" style="top:245px; left:200px;" data-title="Month 9">9</div>
    <div class="node" style="top:170px; left:290px;" data-title="Month 10">10</div>

    <!-- Center node -->
    <div class="node node-center" style="top:383px; left:380px; background:#ff6b6b; color:#fff; font-size:18px;" data-title="Center">&#9829;</div>

    <div id="car"></div>

  </div>

  <div id="popup" class="hidden">
    <h2 id="popupTitle"></h2>
    <button onclick="closePopup()">Close</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
