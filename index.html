<!DOCTYPE html>
<html>
<head>
  <title>10 Months Map</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div id="map">

    <!-- Roads drawn beneath nodes -->
    <svg id="roads" style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;">
      <!-- Road base (dark border) -->
      <g stroke="#9e7f56" stroke-width="14" stroke-linecap="round">
        <line x1="400" y1="320" x2="435" y2="265"/>
        <line x1="435" y1="265" x2="540" y2="275"/>
        <line x1="540" y1="275" x2="540" y2="390"/>
        <line x1="540" y1="390" x2="435" y2="490"/>
        <line x1="435" y1="490" x2="400" y2="540"/>
        <line x1="400" y1="540" x2="365" y2="490"/>
        <line x1="365" y1="490" x2="260" y2="390"/>
        <line x1="260" y1="390" x2="260" y2="275"/>
        <line x1="260" y1="275" x2="365" y2="265"/>
        <line x1="365" y1="265" x2="400" y2="320"/>
        <line x1="400" y1="403" x2="400" y2="320"/>
      </g>
      <!-- Road surface -->
      <g stroke="#d4b87a" stroke-width="9" stroke-linecap="round">
        <line x1="400" y1="320" x2="435" y2="265"/>
        <line x1="435" y1="265" x2="540" y2="275"/>
        <line x1="540" y1="275" x2="540" y2="390"/>
        <line x1="540" y1="390" x2="435" y2="490"/>
        <line x1="435" y1="490" x2="400" y2="540"/>
        <line x1="400" y1="540" x2="365" y2="490"/>
        <line x1="365" y1="490" x2="260" y2="390"/>
        <line x1="260" y1="390" x2="260" y2="275"/>
        <line x1="260" y1="275" x2="365" y2="265"/>
        <line x1="365" y1="265" x2="400" y2="320"/>
        <line x1="400" y1="403" x2="400" y2="320"/>
      </g>
      <!-- Centre dashes -->
      <g stroke="rgba(255,255,255,0.45)" stroke-width="2" stroke-dasharray="10,8" stroke-linecap="round">
        <line x1="400" y1="320" x2="435" y2="265"/>
        <line x1="435" y1="265" x2="540" y2="275"/>
        <line x1="540" y1="275" x2="540" y2="390"/>
        <line x1="540" y1="390" x2="435" y2="490"/>
        <line x1="435" y1="490" x2="400" y2="540"/>
        <line x1="400" y1="540" x2="365" y2="490"/>
        <line x1="365" y1="490" x2="260" y2="390"/>
        <line x1="260" y1="390" x2="260" y2="275"/>
        <line x1="260" y1="275" x2="365" y2="265"/>
        <line x1="365" y1="265" x2="400" y2="320"/>
        <line x1="400" y1="403" x2="400" y2="320"/>
      </g>
    </svg>

    <!-- Heart perimeter nodes -->
    <div class="node" style="top:300px; left:380px;" data-title="Month 1">1</div>
    <div class="node" style="top:245px; left:415px;" data-title="Month 2">2</div>
    <div class="node" style="top:255px; left:520px;" data-title="Month 3">3</div>
    <div class="node" style="top:370px; left:520px;" data-title="Month 4">4</div>
    <div class="node" style="top:470px; left:415px;" data-title="Month 5">5</div>
    <div class="node" style="top:520px; left:380px;" data-title="Month 6">6</div>
    <div class="node" style="top:470px; left:345px;" data-title="Month 7">7</div>
    <div class="node" style="top:370px; left:240px;" data-title="Month 8">8</div>
    <div class="node" style="top:255px; left:240px;" data-title="Month 9">9</div>
    <div class="node" style="top:245px; left:345px;" data-title="Month 10">10</div>

    <!-- Center node -->
    <div class="node node-center" style="top:383px; left:380px; background:#ff6b6b; color:#fff; font-size:18px;" data-title="Center">&#9829;</div>

    <div id="car"></div>

  </div>

  <div id="popup" class="hidden">
    <h2 id="popupTitle"></h2>
    <button onclick="closePopup()">Close</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
