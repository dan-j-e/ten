<!DOCTYPE html>
<html>
<head>
  <title>10 Months Map</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div id="map">
    
    <div class="node" style="top:100px; left:150px;" data-title="Month 1">
      1
    </div>

    <div class="node" style="top:250px; left:400px;" data-title="Month 5">
      5
    </div>

    <div class="node" style="top:450px; left:200px;" data-title="Month 10">
      10
    </div>

    <div id="car"></div>

  </div>

  <div id="popup" class="hidden">
    <h2 id="popupTitle"></h2>
    <button onclick="closePopup()">Close</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
