<!DOCTYPE html>
<html>
<head>
  <title>10 Months Map</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div id="map">

    <!-- Heart perimeter nodes (t = 0° to 324° in 36° steps) -->
    <div class="node" style="top:300px; left:380px;" data-title="Month 1">1</div>
    <div class="node" style="top:245px; left:415px;" data-title="Month 2">2</div>
    <div class="node" style="top:255px; left:520px;" data-title="Month 3">3</div>
    <div class="node" style="top:370px; left:520px;" data-title="Month 4">4</div>
    <div class="node" style="top:470px; left:415px;" data-title="Month 5">5</div>
    <div class="node" style="top:520px; left:380px;" data-title="Month 6">6</div>
    <div class="node" style="top:470px; left:345px;" data-title="Month 7">7</div>
    <div class="node" style="top:370px; left:240px;" data-title="Month 8">8</div>
    <div class="node" style="top:255px; left:240px;" data-title="Month 9">9</div>
    <div class="node" style="top:245px; left:345px;" data-title="Month 10">10</div>

    <!-- Center node -->
    <div class="node node-center" style="top:383px; left:380px; background:#ff6b6b; color:#fff; font-size:18px;" data-title="Center">&#9829;</div>

    <div id="car"></div>

  </div>

  <div id="popup" class="hidden">
    <h2 id="popupTitle"></h2>
    <button onclick="closePopup()">Close</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
